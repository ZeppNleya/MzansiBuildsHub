kind = "web"
previewPath = "/"
title = "MzansiBuilds"
version = "1.0.0"
id = "artifacts/mzansi-builds"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23070

[services.development]
run = "pnpm --filter @workspace/mzansi-builds run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mzansi-builds", "run", "build" ]
publicDir = "artifacts/mzansi-builds/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23070"
BASE_PATH = "/"
